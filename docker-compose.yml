services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
    - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
  
  app:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./justfile
    depends_on:
      db:
        condition: service_healthy
